name = "cf-kimi-api-ts"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "static"
not_found_handling = "none"

# KV + D1 绑定
# 在首次部署前，先创建 KV 和 D1，将下方两个 ID 替换为真实 ID。
# 否则 Git 集成重新部署时会覆盖 Dashboard 上已绑定的配置。
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[[d1_databases]]
binding = "DB"
database_name = "cf-kimi-api-logs"
database_id = "YOUR_D1_DATABASE_ID"
