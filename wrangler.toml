# wrangler.toml
# Git 集成部署：绑定（KV/D1）在 Cloudflare Dashboard 中配置，此处不写 ID。
# 本地 CLI 部署：复制 wrangler.toml.example 并按需填入 ID。

name = "cf-kimi-api-ts"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "static"
not_found_handling = "none"

[vars]
KIMI_API_BASE = "https://www.kimi.com"
DEFAULT_MODEL = ""
TIMEZONE = "Asia/Shanghai"
REQUEST_LOG_RETENTION = "1000"
