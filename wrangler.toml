# wrangler.toml
# Fork the repo first, then use one-click deploy:
#   https://deploy.workers.cloudflare.com/?url=https://github.com/你的用户名/cf-kimi-api-ts
#
# For local development, copy IDs from Cloudflare Dashboard.

name = "cf-kimi-api-ts"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "static"
not_found_handling = "none"

[[kv_namespaces]]
binding = "KV"
# 替换为你的 KV Namespace ID
id = "YOUR_KV_NAMESPACE_ID"

[[d1_databases]]
binding = "DB"
database_name = "cf-kimi-api-logs"
# 替换为你的 D1 Database ID
database_id = "YOUR_D1_DATABASE_ID"

[vars]
KIMI_API_BASE = "https://www.kimi.com"
DEFAULT_MODEL = ""
TIMEZONE = "Asia/Shanghai"
REQUEST_LOG_RETENTION = "1000"
