name = "worker-ai-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
assets = { directory = "static", not_found_handling = "none" }

[[kv_namespaces]]
binding = "KV"
# ⚠️ 请在 Cloudflare Dashboard 创建 KV Namespace 后将 id 替换为实际值
id = "YOUR_KV_NAMESPACE_ID"

[[d1_databases]]
binding = "DB"
database_name = "cf-kimi-api-logs"
# ⚠️ 请在 Cloudflare Dashboard 创建 D1 Database 后将 id 替换为实际值
database_id = "YOUR_D1_DATABASE_ID"

[vars]
KIMI_API_BASE = "https://www.kimi.com"
DEFAULT_MODEL = ""
TIMEZONE = "Asia/Shanghai"
REQUEST_LOG_RETENTION = "1000"
